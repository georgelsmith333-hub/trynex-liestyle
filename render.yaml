services:
  - type: web
    name: trynex-api
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@9 && pnpm install --no-frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: false
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: trynex-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      # --- Object storage (Cloudflare R2) ---
      # Customer-uploaded design files live here. Set the secret values
      # (R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY) in the Render dashboard
      # so they never enter source control.
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

databases:
  - name: trynex-db
    databaseName: trynex
    user: trynex
    region: singapore
    plan: free
