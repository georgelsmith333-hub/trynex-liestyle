<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#E85D04" />
  <title>You're offline — TryNex Lifestyle</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:linear-gradient(135deg,#FFF8F3 0%,#FFF4EE 100%);
      color:#1a1a1a;display:flex;align-items:center;justify-content:center;
      padding:24px;text-align:center;
    }
    .card{max-width:420px}
    .logo{
      width:88px;height:88px;border-radius:24px;
      background:linear-gradient(135deg,#E85D04,#FB8500);
      color:#fff;font-weight:900;font-size:36px;
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 24px;box-shadow:0 12px 36px rgba(232,93,4,.3);
    }
    h1{font-size:24px;font-weight:800;margin-bottom:8px}
    p{font-size:15px;color:#475569;line-height:1.5;margin-bottom:24px}
    button{
      background:linear-gradient(135deg,#E85D04,#FB8500);color:#fff;
      border:0;border-radius:14px;padding:14px 28px;
      font-size:15px;font-weight:700;cursor:pointer;
      box-shadow:0 6px 24px rgba(232,93,4,.3);
    }
    button:active{transform:scale(.97)}
    .small{font-size:12px;color:#94a3b8;margin-top:24px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">T</div>
    <h1>You're offline</h1>
    <p>We can't reach TryNex Lifestyle right now. Check your internet connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
    <p class="small">trynexshop.com</p>
  </div>
</body>
</html>
