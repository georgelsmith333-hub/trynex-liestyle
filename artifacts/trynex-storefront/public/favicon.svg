<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FB8500"/>
      <stop offset="55%" stop-color="#E85D04"/>
      <stop offset="100%" stop-color="#C9450A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="220" rx="118" fill="url(#shine)"/>

  <!-- Bold T crossbar -->
  <rect x="76"  y="138" width="360" height="84" rx="42" fill="white"/>
  <!-- T stem -->
  <rect x="214" y="138" width="84"  height="276" rx="42" fill="white"/>

  <!-- Sparkle / 4-point star — top-right accent (gift/custom mark) -->
  <g transform="translate(420 92)">
    <!-- soft glow halo -->
    <circle r="46" fill="#FFD580" fill-opacity="0.35"/>
    <!-- 4-point sparkle -->
    <path d="M0 -38 L9 -9 L38 0 L9 9 L0 38 L-9 9 L-38 0 L-9 -9 Z"
          fill="#FFE9A8" stroke="#FFB347" stroke-width="3" stroke-linejoin="round"/>
    <circle r="6" fill="white"/>
  </g>

  <!-- Tiny diagonal sparkle bottom-left for balance -->
  <g transform="translate(98 410)" opacity="0.85">
    <path d="M0 -14 L4 -4 L14 0 L4 4 L0 14 L-4 4 L-14 0 L-4 -4 Z"
          fill="#FFE9A8"/>
  </g>
</svg>
