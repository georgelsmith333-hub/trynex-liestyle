    <!-- Favicons & PWA -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" id="favicon-link" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" id="apple-touch-icon-link" />
    <link rel="mask-icon" href="/favicon.svg" color="#E85D04" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Performance: DNS prefetch & preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://trynex-api.onrender.com" crossorigin />
    <link rel="dns-prefetch" href="https://accounts.google.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://connect.facebook.net" />

    <!-- LCP: preload above-the-fold hero image (fallback when no admin-uploaded hero) -->
    <link rel="preload" as="image" href="/images/hero-bg.png" fetchpriority="high" />

    <!-- Google Fonts (subset to weights actually used; display=swap to avoid CLS) -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TryNex Lifestyle",
      "url": "https://trynexshop.com",
      "logo": "https://trynexshop.com/favicon.svg",
      "description": "Bangladesh's #1 premium custom apparel brand. Premium T-shirts, Hoodies, Mugs & Caps with fast delivery across all 64 districts.",
      "foundingDate": "2020",
      "areaServed": {
        "@type": "Country",
        "name": "Bangladesh"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+8801903426915",
        "contactType": "customer support",
        "availableLanguage": ["Bengali", "English"],
        "areaServed": "BD"
      },
      "sameAs": [
        "https://facebook.com/trynexlifestyle",
        "https://instagram.com/trynexlifestyle",
        "https://youtube.com/@trynex"
      ],
      "paymentAccepted": "Cash on Delivery, bKash, Nagad, Rocket, Visa",
      "currenciesAccepted": "BDT",
      "priceRange": "৳399 - ৳3999"
    }</script>

    <!-- Structured Data: WebSite with SearchAction -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TryNex Lifestyle",
      "url": "https://trynexshop.com",
      "description": "Premium custom apparel brand in Bangladesh",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://trynexshop.com/products?search={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }</script>

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">{
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "TryNex Lifestyle",
      "image": "https://trynexshop.com/opengraph.jpg",
      "url": "https://trynexshop.com",
      "telephone": "+8801903426915",
      "email": "hello@trynexshop.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Dhaka",
        "addressCountry": "BD"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 23.8103,
        "longitude": 90.4125
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "08:00",
        "closes": "22:00"
      },
      "priceRange": "৳৳",
      "servesCuisine": "Custom Apparel",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "5000",
        "bestRating": "5",
        "worstRating": "1"
      }
    }</script>

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" data-cfasync="false" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <!--
      data-cfasync="false" tells Cloudflare Rocket Loader to leave this script
      alone. Without it, Rocket Loader rewrites type="module" to a synthetic
      type that the browser refuses to execute, and the app stays a blank
      white screen on mobile. The vite plugin in vite.config.ts also adds
      data-cfasync="false" to every other <script> tag in the built HTML.
    -->
    <script type="module" data-cfasync="false" src="/src/main.tsx"></script>
  </body>
</html>
